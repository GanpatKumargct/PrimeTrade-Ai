version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: primetrade_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: primetrade_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetrade_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/primetrade_app
      - SECRET_KEY=supersecretkey12345
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
